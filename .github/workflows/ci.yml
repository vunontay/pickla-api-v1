name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Poetry + Pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint with ruff
        run: poetry run ruff check .

      - name: Format check with ruff
        run: poetry run ruff format --check .

      - name: Type check with mypy
        run: poetry run mypy src


  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pickla
          POSTGRES_PASSWORD: pickla
          POSTGRES_DB: pickla
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pickla"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Poetry + Pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
            .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U pickla; do
            sleep 1
          done

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://pickla:pickla@localhost:5432/pickla
          TEST_DATABASE_URL: postgresql+asyncpg://pickla:pickla@localhost:5432/pickla
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-secret-key
        run: poetry run pytest --cov=src --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
